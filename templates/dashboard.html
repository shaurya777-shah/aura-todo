<!DOCTYPE html>
<html>

<head>

    <title>Aura Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="topbar">

        <h1>⚡ Aura Dashboard</h1>

        <div>

            <a href="/exam" class="nav-btn">
                Exam Analyzer
            </a>

            <a href="/logout" class="logout-btn">
                Logout
            </a>

        </div>

    </div>

    <div class="main-grid">

        <div class="card add-card">

            <h2>Add New Task</h2>

            <form action="/add" method="POST">

                <input
                    type="text"
                    name="task"
                    placeholder="Enter task..."
                    required
                >

                <select name="subject">

                    {% for subject in subjects %}

                    <option value="{{subject}}">
                        {{subject}}
                    </option>

                    {% endfor %}

                </select>

                <input type="datetime-local" name="due">

                <button type="submit">
                    Add Task
                </button>

            </form>

        </div>

        <div class="card">

            <h2>Your Subjects</h2>

            <div class="subjects-grid">

                {% for subject in subjects %}

                <a
                    href="/subject/{{subject}}"
                    class="subject-box"
                >

                    {{subject}}

                </a>

                {% endfor %}

            </div>

        </div>

    </div>

    <div class="tasks-section">

        <h2>📌 Your Tasks</h2>

        {% for task in tasks %}

        <div class="task-card {{task.status}}">

            <div>

                <h3>{{task.task}}</h3>

                <p>{{task.subject}}</p>

                <p>{{task.due}}</p>

            </div>

            <a
                href="/done/{{task.id}}"
                class="done-btn"
            >
                Done
            </a>

        </div>

        {% endfor %}

    </div>

</body>

</html>
